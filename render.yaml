databases:
  - name: books-db
    databaseName: books_db
    user: books_user
    plan: free

services:
  - type: web
    name: render-test-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: books-db
          property: connectionString

